<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cooperative — Online Membership Application</title>
    
    <script src="https://unpkg.com/@sanity/client@6/umd/sanityClient.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@sanity/image-url@1.0.2/lib/browser/image-url.umd.js"></script>
    
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/application.css">
</head>
<body>

    <div id="navbar-container"></div>

    <main class="application-container">
        <header class="form-header">
            <h1>Online Membership Application</h1>
            <p>Please fill out the details below to submit your application to the cooperative.</p>
        </header>

        <form id="membershipForm" class="app-form">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="yourname@email.com">
            </div>

            <div class="form-group">
                <label for="phone">Contact Number</label>
                <input type="tel" id="phone" required placeholder="e.g., 09123456789">
            </div>

            <div class="form-group">
                <label for="address">Home Address</label>
                <textarea id="address" rows="3" required placeholder="Complete home address"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </main>

    <div id="footer-container"></div>

    <script src="js/application.js"></script>
    
    <script src="js/footer.js"></script>

    <script type="module">
        import { renderNavbar } from './js/navbar.js';
        
        if (typeof renderNavbar === 'function') {
            renderNavbar('#navbar-container');
        }
    </script>
</body>
</html>
